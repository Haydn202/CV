design:
  theme: engineeringresumes

  page:
    size: us-letter
    top_margin: 1.65cm
    bottom_margin: 1.65cm
    left_margin: 1.7cm
    right_margin: 1.7cm
    show_footer: false
    show_top_note: false

  colors:
    name: rgb(0, 79, 144)       # #004f90
    headline: rgb(0, 79, 144)
    connections: rgb(0, 79, 144)
    section_titles: rgb(0, 79, 144)
    links: rgb(0, 79, 144)

  typography:
    alignment: justified
    line_spacing: 0.62em
    font_family: Source Sans 3
    font_size:
      body: 10pt
      name: 28pt
      headline: 10pt
      connections: 10pt
      section_titles: 1.32em

  links:
    show_external_link_icon: true

  header:
    space_below_name: 0.3cm
    space_below_headline: 0.3cm
    space_below_connections: 0.32cm
    connections:
      show_icons: true
      separator: ''
      space_between_connections: 0.56cm

  section_titles:
    type: with_full_line
    space_above: 0.38cm
    space_below: 0.2cm

  sections:
    space_between_regular_entries: 0.36cm
    # Slightly tighter gaps between profile / skills / mentoring text blocks
    space_between_text_based_entries: 0.14cm
    show_time_spans_in: []

  entries:
    # Wider main column (1fr) so long job titles / bullets wrap less — date col still fits "Jan 2025 – present" etc.
    date_and_location_width: 3.5cm
    space_between_columns: 0.07cm
    side_space: 0.18cm
    short_second_row: true
    summary:
      space_above: 0.1cm
    highlights:
      space_left: 0.36cm
      space_above: 0.09cm
      space_between_items: 0.1cm
      space_between_bullet_and_text: 0.36em

